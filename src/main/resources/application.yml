server:
  port: 7676
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cbs?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  ai:
    dashscope:
      # 通义千问 API 地址（固定）
#      base-url: https://dashscope.aliyuncs.com/api/v1
      # 你的阿里云灵积 API Key（需在阿里云控制台获取）
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          # 通义千问模型名称，可选：qwen-max/qwen-plus/qwen-turbo
          model: qwen3-max
          # 可选参数：温度值，控制生成随机性
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
#          fallback:
#            enabled: true
#            model: text-embedding-v3
#          retry:
#            max-attempts: 3
#            initial-delay-ms: 1000
#            multiplier: 2.0
#            max-delay-ms: 10000
    vectorstore:
      milvus:
        client:
          host: localhost      # Milvus 服务地址
          port: 19530          # Milvus 默认端口
          username: ccl
          password: milvus
        collection-name: demo_vector_collection  # 集合名称（类似表名）
        embedding-dimension: 1024                # 必须与嵌入模型维度一致（智谱 embedding-2 是 1024）
        index-type: IVF_FLAT                     # 1.1.2 推荐新手使用的索引类型
        metric-type: COSINE                      # 余弦相似度（1.1.2 校验更严格）
        initialize-schema: true                  # 1.1.2 自动创建集合/索引（核心特性，M2 版无）
        id-field-name: chunk_id                 # 自定义主键字段名
        auto-id: false                           # 1.1.2 修复了自定义ID失效问题
        consistency-level: STRONG                # 1.1.2 新增一致性级别配置

  kafka:
    bootstrap-servers: kafka-broker-1:29092,kafka-broker-2:29093
    consumer:
      group-id: flink-billing-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
  elasticsearch:
    uris: http://localhost:9200

flink:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: flink-billing-consumer-group
      auto-offset-reset: earliest
      parallelism: 1
    producer:
      parallelism: 1
    topics:
      input: telecom-bill
      output: billing-accumulate
      error: billing-bad-records
    window:
      size: 1
      unit: days
      slide: 1
      slide-unit: days
    watermark:
      max-out-of-orderness: 5
      unit: minutes

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  store-type: redis
  is-concurrent: false
  timeout: 86400
  active-timeout: -1
  is-share: false
  is-log: false
  jwt-secret-key: abcdefghijklmnopqrstuvwxyz

file:
  upload:
    path: ${FILE_UPLOAD_PATH:e:/JavaProjects/milvus/documents}

logging:
  aspect:
    enabled: true
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.example.websocketchatbacked: INFO
    com.example.websocketchatbacked.config.LoggingAspect: INFO
    org.springframework.ai.chat.client.advisor: DEBUG